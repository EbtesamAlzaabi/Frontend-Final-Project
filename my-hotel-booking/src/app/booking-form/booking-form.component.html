<div class="container d-flex justify-content-center align-items-center mt-5">

  <div class="card shadow p-4" style="width: 500px; border-radius: 15px;">

    <h3 class="text-primary mb-4">Complete Reservation</h3>

    <div *ngIf="bookedRoom">
      <p><b>Room:</b> {{bookedRoom.name}}</p>
      <p><b>Price:</b> ${{bookedRoom.price}}</p>
    </div>

    <form>

      <div class="mb-3">
        <label class="form-label">Guest Full Name</label>
        <input [(ngModel)]="name" name="name" class="form-control" placeholder="Enter your name">
      </div>

      <p class="text-muted">Welcome {{name}}</p>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" placeholder="example@email.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Check-in</label>
        <input type="date" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Check-out</label>
        <input type="date" class="form-control">
      </div>

      <button class="btn btn-primary w-100 mt-3" (click)="confirmBooking()">
        Confirm Booking
      </button>
      <button class="btn btn-secondary w-100 mt-3" (click)="goBack()">
        Back
      </button>
    </form>

  </div>

</div>
