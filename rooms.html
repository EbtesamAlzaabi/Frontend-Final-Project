<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms Listing</title>

  <!-- Link css-bootstrap -->
  <link rel="stylesheet" href="./CSS/bootstrap.min.css">
  <!-- Link icons bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Link css -->
  <link rel="stylesheet" href="./CSS/style.css">

</head>

<body>

  <!---------------------------------------- Navbar ---------------------------------------->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Hotel</a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Rooms</a></li>
          <li class="nav-item d-flex align-items-center">
            <i class="bi bi-moon-fill theme-toggle" id="themeToggle"></i>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!---------------------------------------- Filters ---------------------------------------->
  <div class="container d-flex justify-content-center">
    <div class="filter-bar">

      <div class="filter-content">

        <input type="text" id="searchInput" placeholder="Search by room name">

        <select id="typeFilter">
          <option value="">All Types</option>
          <option value="Single">Single</option>
          <option value="Double">Double</option>
          <option value="Suite">Suite</option>
        </select>

        <div class="price-box">
          <label>Max Price: <span id="priceValue">1000</span>$</label>
          <input type="range" min="50" max="1000" id="priceFilter" value="1000">
        </div>

      </div>

    </div>
  </div>
  <!---------------------------------------- Rooms ---------------------------------------->
  <div class="container my-4">
    <div class="row" id="roomsContainer"></div>
  </div>


  <!-- Link js-bootstrap -->
  <script src="./JS/bootstrap.bundle.min.js"></script>
  <!-- Link app-js -->
  <script src="JS/rooms.js"></script>


</body>

</html>
