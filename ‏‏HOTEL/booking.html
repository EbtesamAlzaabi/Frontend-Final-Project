<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Form</title>

  <!-- Link css-bootstrap -->
  <link rel="stylesheet" href="./CSS/bootstrap.min.css">
  <!-- Link icons bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Link css -->
  <link rel="stylesheet" href="./CSS/style.css">

</head>

<body>

  <!---------------------------------------- Navbar ---------------------------------------->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Stay Ease</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
          <li class="nav-item d-flex align-items-center">
            <i class="bi bi-moon-fill theme-toggle" id="themeToggle" title="Toggle dark mode"></i>
          </li>
        </ul>
      </div>
    </div>
  </nav>


  <!------------------------------------- Booking Form ------------------------------------->
  <div class="container my-5">
    <h2 class="text-center mb-4">Book Your Room</h2>

    <div id="summary" class="summary-box d-none"></div>

    <form id="bookingForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="roomName" class="form-label">Room Selected</label>
        <input type="text" id="roomName" class="form-control" readonly>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="guestName" class="form-label">Guest Name</label>
          <input type="text" class="form-control" id="guestName" required>
          <div class="error-msg" id="guestNameError"></div>
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
          <div class="error-msg" id="emailError"></div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="phone" class="form-label">Phone</label>
          <input type="number" class="form-control" id="phone" required>
          <div class="error-msg" id="phoneError"></div>
        </div>
        <div class="col-md-3">
          <label for="checkIn" class="form-label">Check-in Date</label>
          <input type="date" class="form-control" id="checkIn" required>
          <div class="error-msg" id="checkInError"></div>
        </div>
        <div class="col-md-3">
          <label for="checkOut" class="form-label">Check-out Date</label>
          <input type="date" class="form-control" id="checkOut" required>
          <div class="error-msg" id="checkOutError"></div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="guests" class="form-label">Number of Guests</label>
          <select class="form-select" id="guests" required>
            <option value="">Select</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
          </select>
          <div class="error-msg" id="guestsError"></div>
        </div>
        <div class="col-md-6">
          <label for="requests" class="form-label">Special Requests</label>
          <textarea class="form-control" id="requests" rows="1"></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary me-2" id="submitBtn">Submit</button>
      <button type="reset" class="btn btn-secondary" id="resetBtn">Reset</button>
    </form>
  </div>

  <!-- Link js-bootstrap -->
  <script src="./JS/bootstrap.bundle.min.js"></script>
  <!-- Link app-js -->
  <script src="JS/booking.js"></script>


</body>

</html>
